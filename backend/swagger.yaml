openapi: 3.0.0
info:
  title: University Management System API
  description: Phase 2 API Documentation including RBAC and ACID Transactions
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the status of the API
      security: []
      responses:
        '200':
          description: API is running successfully

  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new user with a hashed password and role
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@ums.edu.pk
                password:
                  type: string
                  example: SuperSecretPassword123
                role:
                  type: string
                  enum: [Admin, Instructor, Student]
                  example: Admin
      responses:
        '201':
          description: User registered successfully
        '400':
          description: User already exists

  /auth/login:
    post:
      summary: Login user
      description: Authenticates user and returns a JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@ums.edu.pk
                password:
                  type: string
                  example: SuperSecretPassword123
      responses:
        '200':
          description: Logged in successfully
        '401':
          description: Invalid credentials

  /enrollment:
    post:
      summary: Enroll in a section (ACID Transaction)
      description: Enrolls a student using a raw SQL transaction (BEGIN, COMMIT, ROLLBACK). Requires Admin or Student role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                student_id:
                  type: integer
                  example: 1
                section_id:
                  type: integer
                  example: 12
      responses:
        '201':
          description: Student successfully enrolled
        '400':
          description: Transaction failed and rolled back (e.g., duplicate or capacity full)
        '403':
          description: Access denied (Invalid role)

  /fees/pay:
    post:
      summary: Process a fee payment (ACID Transaction)
      description: Securely processes a fee payment. Implements row-level locking and rollback on overpayment.
      tags:
        - Fees
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fee_id
                - payment_amount
              properties:
                fee_id:
                  type: integer
                  example: 1
                payment_amount:
                  type: number
                  format: float
                  example: 10000
      responses:
        '200':
          description: Payment processed successfully (Transaction Committed)
        '400':
          description: Bad Request / Overpayment (Transaction Rolled Back)
        '401':
          description: Unauthorized - No valid token provided